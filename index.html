<!doctype html><html><head><meta charset="utf-8"><title>OMR V2 Calibração</title>
<style>body{font-family:Arial;margin:20px}label{display:block;margin:8px 0}input[type=range]{width:300px}</style>
</head><body>
<h1>OMR V2 - Calibração da Grade</h1>
<p>Use os controles para ajustar a grade até coincidir com as bolhas.</p>
<label>Deslocamento X <input id=x type=range min=-100 max=100 value=0 oninput="u()"><span id=xv>0</span></label>
<label>Deslocamento Y <input id=y type=range min=-100 max=100 value=0 oninput="u()"><span id=yv>0</span></label>
<label>Espaçamento Horizontal <input id=h type=range min=20 max=60 value=34 oninput="u()"><span id=hv>34</span></label>
<label>Espaçamento Vertical <input id=v type=range min=20 max=60 value=38 oninput="u()"><span id=vv>38</span></label>
<button onclick="salvar()">Salvar calibração</button>
<pre id=out></pre>
<script>
function u(){
xv.textContent=x.value;yv.textContent=y.value;hv.textContent=h.value;vv.textContent=v.value;
out.textContent=JSON.stringify({offsetX:+x.value,offsetY:+y.value,hStep:+h.value,vStep:+v.value},null,2);
}
function salvar(){
localStorage.setItem('omr_calibracao',out.textContent);
alert('Calibração salva');
}
u();
</script></body></html>
